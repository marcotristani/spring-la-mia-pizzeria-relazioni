<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <th:block
      th:replace="~{fragments/head :: head('Gestione Pizza')}"
    ></th:block>
  </head>
  <body class="bg-light">
    <!-- Navbar inclusa -->
    <th:block
      th:replace="~{fragments/navbar :: navbar(${edit} ? 'Modifica Pizza' : 'Crea Nuova Pizza', 'pizzas')}"
    />

    <div class="container my-5">
      <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
          <!-- Card principale del Form -->
          <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4 p-md-5">
              <!-- Intestazione dinamica con Bottone "Nuova Offerta" integrato a destra -->
              <div
                class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom"
              >
                <h2
                  th:text="${edit} ? 'Modifica della Pizza' : 'Crea Nuova Pizza'"
                  class="h4 text-dark fw-bold mb-0"
                >
                  Gestione Pizza
                </h2>
                <!-- Bottone per creare una nuova offerta nel database -->
                <a
                  th:if="${edit}"
                  th:href="@{|/pizzas/${pizza.id}/offerta|}"
                  class="btn btn-sm btn-outline-success px-3"
                >
                  Nuova Offerta
                </a>
              </div>

              <form
                id="form-pizza"
                th:action="${edit} ? @{|/pizzas/${pizza.id}/edit|} : @{/pizzas/create}"
                method="post"
                th:object="${pizza}"
                class="row g-4 needs-validation"
                novalidate
              >
                <!-- Campo Nome -->
                <div class="col-md-8">
                  <label
                    for="nome"
                    class="form-label fw-semibold small text-muted"
                    >Nome pizza:</label
                  >
                  <input
                    type="text"
                    class="form-control form-control-lg fs-6"
                    id="nome"
                    placeholder="Es. Margherita"
                    th:field="*{nome}"
                    th:errorClass="is-invalid"
                    th:classappend="${#fields.hasAnyErrors() and !#fields.hasErrors('nome')} ? 'is-valid'"
                    required
                  />
                  <div
                    class="invalid-feedback"
                    th:if="${#fields.hasErrors('nome')}"
                  >
                    <div th:each="error : ${#fields.errors('nome')}">
                      [[${error}]]
                    </div>
                  </div>
                </div>

                <!-- Campo Prezzo -->
                <div class="col-md-4">
                  <label
                    for="price"
                    class="form-label fw-semibold small text-muted"
                    >Prezzo:</label
                  >
                  <div class="input-group has-validation">
                    <span
                      class="input-group-text bg-white border-end-0 text-muted fs-6"
                      >€</span
                    >
                    <input
                      type="number"
                      step="0.01"
                      min="0.00"
                      class="form-control form-control-lg fs-6"
                      id="price"
                      placeholder="0.00"
                      th:field="*{price}"
                      th:errorClass="is-invalid"
                      th:classappend="${#fields.hasAnyErrors() and !#fields.hasErrors('price')} ? 'is-valid'"
                      required
                    />
                    <div
                      class="invalid-feedback"
                      th:if="${#fields.hasErrors('price')}"
                    >
                      <div th:each="error : ${#fields.errors('price')}">
                        [[${error}]]
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Campo URL Immagine -->
                <div class="col-12">
                  <label
                    for="url-image"
                    class="form-label fw-semibold small text-muted"
                    >URL immagine copertina:</label
                  >
                  <input
                    type="text"
                    class="form-control form-control-lg fs-6"
                    id="url-image"
                    placeholder="https://esempio.com"
                    th:field="*{url_image}"
                    th:errorClass="is-invalid"
                    th:classappend="${#fields.hasAnyErrors() and !#fields.hasErrors('url_image')} ? 'is-valid'"
                    required
                  />
                  <div
                    class="invalid-feedback"
                    th:if="${#fields.hasErrors('url_image')}"
                  >
                    <div th:each="error : ${#fields.errors('url_image')}">
                      [[${error}]]
                    </div>
                  </div>
                </div>

                <!-- Campo Descrizione -->
                <div class="col-12">
                  <label
                    for="description"
                    class="form-label fw-semibold small text-muted"
                    >Descrizione degli ingredienti:</label
                  >
                  <textarea
                    class="form-control fs-6"
                    id="description"
                    rows="4"
                    placeholder="Inserisci la descrizione o la lista degli ingredienti..."
                    th:field="*{description}"
                    th:errorClass="is-invalid"
                    th:classappend="${#fields.hasAnyErrors() and !#fields.hasErrors('description')} ? 'is-valid'"
                  ></textarea>
                  <div
                    class="invalid-feedback"
                    th:if="${#fields.hasErrors('description')}"
                  >
                    <div th:each="error : ${#fields.errors('description')}">
                      [[${error}]]
                    </div>
                  </div>
                </div>

                <!-- SEZIONE SELEZIONE OFFERTE (Checkbox dinamici) -->
                <div th:if="${edit}" class="col-12">
                  <label
                    class="form-label fw-semibold small text-muted d-block mb-2"
                    >Associa Offerte Speciali:</label
                  >

                  <!-- Contenitore a griglia per i checkbox se ci sono offerte disponibili -->
                  <div
                    th:if="${listaOfferte != null and !listaOfferte.empty}"
                    class="row g-3 p-3 bg-white border rounded shadow-sm mx-0"
                  >
                    <div
                      th:each="off : ${listaOfferte}"
                      class="col-sm-6 col-md-4"
                    >
                      <div class="form-check">
                        <input
                          type="checkbox"
                          class="form-check-input"
                          th:id="|offerta-${off.id}|"
                          th:value="${off.id}"
                          th:field="*{offerte}"
                        />
                        <label
                          class="form-check-label fw-medium text-dark small"
                          th:for="|offerta-${off.id}|"
                          th:text="${off.nome}"
                        >
                          Nome Offerta
                        </label>
                      </div>
                    </div>
                  </div>

                  <!-- Messaggio di fallback se non esistono ancora offerte create nel sistema -->
                  <div
                    th:if="${listaOfferte == null or listaOfferte.empty}"
                    class="text-center p-3 bg-white border rounded text-muted small"
                  >
                    <i class="bi bi-info-circle d-block mb-1 fs-5"></i>
                    Nessuna offerta registrata nel sistema. Clicca su "Nuova
                    Offerta" per crearne una.
                  </div>
                </div>

                <!-- Pulsanti di azione finali -->
                <div class="col-12 pt-2 d-grid gap-2">
                  <input
                    th:unless="${edit}"
                    class="btn btn-primary btn-lg fs-6 shadow-sm"
                    type="submit"
                    value="Crea nuova pizza"
                  />
                  <input
                    th:if="${edit}"
                    class="btn btn-primary btn-lg fs-6 shadow-sm"
                    type="submit"
                    value="Aggiorna la pizza"
                  />
                  <a
                    th:href="@{/pizzas}"
                    class="btn btn-link btn-sm text-decoration-none text-muted"
                  >
                    Torna alla lista pizze
                  </a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
