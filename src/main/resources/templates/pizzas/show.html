<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <!-- Sostituito con th:block per mantenere la validità del frammento head -->
    <th:block th:replace="~{fragments/head :: head(|Pizza ${pizza.nome}|)}" />
  </head>
  <body class="bg-light">
    <!-- Navbar inclusa globalmente in cima alla pagina -->
    <div th:replace="~{fragments/navbar :: navbar(Pizze, 'pizzas')}"></div>

    <div th:object="${pizza}" class="container my-5" style="max-width: 600px">
      <!-- Card Dettaglio Pizza -->
      <div class="card shadow-sm border-0 mb-4">
        <img
          th:if="*{url_image != null and !url_image.empty}"
          th:src="*{url_image}"
          class="card-img-top"
          th:alt="*{nome}"
          style="height: 300px; object-fit: cover"
        />

        <div class="card-body text-center py-4">
          <h1 class="card-title h3 mb-3 text-dark fw-bold" th:text="*{nome}">
            Nome Pizza
          </h1>
          <p class="card-text text-muted mb-4" th:text="*{description}">
            Descrizione dettagliata della pizza...
          </p>
          <div class="h4 text-success fw-bold mb-4">
            <span th:text="*{price}">0.00</span> €
          </div>

          <div class="d-flex justify-content-center gap-2">
            <a th:href="@{|/pizzas/*{id}/edit|}" class="btn btn-primary px-4">
              <i class="bi bi-pencil"></i> Modifica Pizza
            </a>
            <button
              type="button"
              class="btn btn-danger px-4"
              data-bs-toggle="modal"
              th:data-bs-target="|#delete-pizza-*{id}|"
            >
              Elimina Pizza
            </button>
          </div>
        </div>
      </div>

      <!-- SEZIONE OFFERTE -->
      <div class="card shadow-sm border-0 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 text-dark fw-bold mb-0">Offerte Attive</h2>
          <!-- Bottone Aggiungi Offerta -->
          <a
            th:href="@{|/pizzas/*{id}/offerta|}"
            class="btn btn-sm btn-outline-success px-3"
            >Nuova Offerta
          </a>
        </div>

        <!-- Lista delle Offerte -->
        <ul
          th:if="*{not #lists.isEmpty(offerte)}"
          class="list-group list-group-flush"
        >
          <li
            th:each="offerta : *{offerte}"
            class="list-group-item d-flex justify-content-between align-items-center px-0 py-2"
          >
            <div class="d-flex align-items-center gap-2">
              <span th:text="${offerta.nome}" class="text-dark fw-medium"
                >Nome Offerta</span
              >
            </div>
          </li>
        </ul>

        <!-- Messaggio se non ci sono offerte -->
        <div
          th:if="*{#lists.isEmpty(offerte)}"
          class="text-center py-3 text-muted small"
        >
          Nessuna offerta attiva per questa pizza.
        </div>
      </div>
    </div>

    <div
      th:replace="~{fragments/delete-modal :: delete-modal(${pizza}, 'pizza')}"
    ></div>

    <script
      th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"
    ></script>
  </body>
</html>
