<!doctype html>
<html lang="it" xmlns:th="http://thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <th:block th:replace="~{fragments/head :: head('Offerte')}" />
  </head>
  <body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar('Offerte','offers')}"></div>

    <div class="container my-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0 text-dark fw-bold">Elenco Offerte Speciali</h1>
        <a th:href="@{/offers/create}" class="btn btn-primary shadow-sm">
          Nuova Offerta
        </a>
      </div>

      <div
        th:if="${#lists.isEmpty(offerte)}"
        class="alert alert-info text-center py-4 shadow-sm border-0"
        role="alert"
      >
        <i class="bi bi-info-circle fs-4 d-block mb-2"></i>
        Non ci sono offerte attive al momento.
      </div>

      <div
        th:if="${not #lists.isEmpty(offerte)}"
        class="card shadow-sm border-0 overflow-hidden"
      >
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light text-muted small uppercase">
              <tr>
                <th class="ps-4 py-3" style="width: 40%">Nome Offerta</th>
                <th class="py-3">Valida Dal</th>
                <th class="py-3">Fino Al</th>
                <th class="pe-4 py-3 text-end" style="width: 25%">Azioni</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="offerta : ${offerte}" th:object="${offerta}">
                <!-- Nome Offerta -->
                <td class="ps-4 fw-semibold text-dark" th:text="*{nome}">
                  Nome Offerta
                </td>

                <td>
                  <span
                    class="badge bg-success-subtle text-success px-2.5 py-1.5 rounded-pill fs-7 fw-medium"
                    th:text="*{dataInizio}"
                  >
                    01/01/2026
                  </span>
                </td>

                <td>
                  <span
                    class="badge bg-danger-subtle text-danger px-2.5 py-1.5 rounded-pill fs-7 fw-medium"
                    th:text="*{dataFine}"
                  >
                    31/01/2026
                  </span>
                </td>
                <!-- Pulsanti di Azione -->
                <td class="pe-4 text-end">
                  <div class="btn-group btn-group-sm" role="group">
                    <a
                      th:href="@{|/offers/*{id}/edit|}"
                      class="btn btn-outline-secondary"
                      title="Modifica"
                    >
                      Modifica
                    </a>

                    <button
                      type="button"
                      class="btn btn-outline-danger"
                      data-bs-toggle="modal"
                      th:data-bs-target="|#delete-offerta-*{id}|"
                      title="Elimina"
                    >
                      Elimina
                    </button>
                  </div>

                  <div
                    th:replace="~{fragments/delete-modal :: delete-modal(${offerta}, 'offerta')}"
                  ></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script
      th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"
    ></script>
  </body>
</html>
