<!doctype html>
<html lang="it" xmlns:th="http://thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <th:block th:replace="~{fragments/head :: head('Ingredienti')}" />
  </head>
  <body class="bg-light">
    <div
      th:replace="~{fragments/navbar :: navbar('Ingredienti','ingredients')}"
    ></div>

    <div class="container my-5">
      <div
        th:if="${#lists.isEmpty(ingredienti)}"
        class="alert alert-info text-center py-4 shadow-sm border-0"
        role="alert"
      >
        Non ci sono ingredienti.
      </div>

      <div
        th:if="${not #lists.isEmpty(ingredienti)}"
        class="card shadow-sm border-0 overflow-hidden"
      >
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light text-muted small uppercase">
              <tr>
                <th class="ps-4 py-3" style="width: 30%">Ingrediente</th>
                <!-- <th class="py-3" style="width: 25%">Pizze Associata</th> -->
                <th class="pe-4 py-3 text-end" style="width: 20%">Azioni</th>
              </tr>
            </thead>
            <tbody>
              <tr
                th:each="ingrediente : ${ingredienti}"
                th:object="${ingrediente}"
              >
                <!-- Nome Offerta -->
                <td class="ps-4 fw-semibold text-dark" th:text="*{nome}">
                  Nome Ingrediente
                </td>

                <!-- Pizza Associata (Oggetto Singolo) -->
                <!-- <td>
                  <div th:if="*{pizza != null}">
                    <span
                      class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill small fw-medium px-2.5 py-1.5"
                    >
                      <i class="bi bi-dot"></i>
                      <span th:text="*{pizza.nome}">Nome Pizza</span>
                    </span>
                  </div>
                  <span
                    th:if="*{pizza == null}"
                    class="text-muted small fst-italic"
                  >
                    Nessuna pizza
                  </span>
                </td> -->

                <!-- Pulsanti di Azione -->
                <td class="pe-4 text-end">
                  <div class="btn-group btn-group-sm" role="group">
                    <a
                      th:href="@{|/ingredients/*{id}/edit|}"
                      class="btn btn-outline-secondary"
                      title="Modifica"
                    >
                      Modifica
                    </a>

                    <button
                      type="button"
                      class="btn btn-outline-danger"
                      data-bs-toggle="modal"
                      th:data-bs-target="|#delete-ingrediente-*{id}|"
                      title="Elimina"
                    >
                      Elimina
                    </button>
                  </div>

                  <div
                    th:replace="~{fragments/delete-modal :: delete-modal(${ingrediente}, 'ingrediente')}"
                  ></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script
      th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"
    ></script>
  </body>
</html>
